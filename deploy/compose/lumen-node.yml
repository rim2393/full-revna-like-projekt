name: lumen-node

services:
  node-agent:
    image: ${LUMEN_NODE_AGENT_IMAGE}
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-UTC}
      LUMEN_PANEL_URL: ${LUMEN_PANEL_URL}
      LUMEN_NODE_NAME: ${LUMEN_NODE_NAME:-manual-node}
      LUMEN_NODE_RUNTIME: process
      LUMEN_INSTALL_TOKEN_FILE: /run/lumen-node/install-token
      LUMEN_STATE_DIR: /var/lib/lumen-node
      LUMEN_XRAY_RELOAD_MODE: process
      LUMEN_HYSTERIA2_RELOAD_MODE: process
      LUMEN_NAIVE_RELOAD_MODE: process
      LUMEN_OPENVPN_RELOAD_MODE: process
      LUMEN_SHADOWSOCKS_RELOAD_MODE: process
      LUMEN_SHADOWSOCKS_PLUGIN_RELOAD_MODE: process
      LUMEN_TUIC_RELOAD_MODE: process
      LUMEN_ENABLE_LIVE_SMOKE: ${LUMEN_ENABLE_LIVE_SMOKE:-false}
    volumes:
      - /opt/lumen-node/state:/var/lib/lumen-node
      - /opt/lumen-node/secrets:/run/lumen-node:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "lumen-node-agent healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
